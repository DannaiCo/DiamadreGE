<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />

        <title>Día del Padre - iCo Medios</title>

        <link rel="stylesheet" href="https://use.typekit.net/vsp7vcb.css" />

        <style>
            html,
            body {
                margin: 0;
                padding: 0;

                width: 100vw;
                height: 100vh;

                overflow: hidden;
            }

            .contenedor {
                position: relative;

                width: 100vw;
                height: 100vh;
            }

            /* VIDEO DE FONDO */

            #fondoVideo {
                position: absolute;

                top: 0;
                left: 0;

                width: 100%;
                height: 100%;

                object-fit: fill;

                z-index: 0;
            }

            /* CONTENIDO */

            #contenido {
                position: absolute;

                top: 0;
                left: 0;

                width: 100%;
                height: 100%;

                z-index: 10;
            }

            /* MENSAJE */

            .dicho {
                position: absolute;

                top: 34%;

                left: 27%;

                width: 46%;

                text-align: center;

                font-family: "filson-soft", sans-serif;

                font-weight: 700;

                font-style: normal;

                font-size: 125px;

                line-height: 1.15;

                color: #cd2530;

                transform: scaleY(0.5);

                transform-origin: center center;

                opacity: 0;

                transition: opacity 0.8s ease;
            }

            /* NOMBRE PAPÁ */

            .papa {
                position: absolute;

                top: 46%;

                left: 8%;

                width: 84%;

                text-align: center;

                font-family: "filson-soft", sans-serif;

                font-weight: 700;

                font-style: normal;

                font-size: 81px;

                color: #cd2530;

                transform: scaleY(0.5);

                transform-origin: center center;

                opacity: 0;

                transition: opacity 0.8s ease;
            }

            .mostrar {
                opacity: 1;
            }
        </style>
    </head>

    <body>
        <div class="contenedor">
            <video autoplay muted loop playsinline id="fondoVideo">
                <source src="fondo.mp4" type="video/mp4" />
            </video>

            <div id="contenido">
                <div class="dicho"></div>

                <div class="papa"></div>
            </div>
        </div>

        <script>
            const url =
                "https://script.google.com/macros/s/AKfycbzwPsdGLy5kUFCS6T-J5LaXAsN8tPmV_h23cY9wNMb5-aJUj-fnhpsVya1oSLXGgjlelg/exec";

            const elDicho = document.querySelector(".dicho");

            fetch(url)
                .then((response) => response.json())
                .then((data) => {
                    console.log("Datos recibidos:", data);

                    if (!data || data.length === 0) {
                        elDicho.textContent = "No hay frases aprobadas";
                        elDicho.classList.add("mostrar");
                        return;
                    }

                    let index = 0;

                    function mostrarMensaje() {
                        const item = data[index];

                        console.log("Frase actual:", item);

                        elDicho.classList.remove("mostrar");

                        setTimeout(() => {
                            elDicho.textContent = item || "";
                            elDicho.classList.add("mostrar");
                        }, 300);

                        index++;

                        if (index >= data.length) {
                            index = 0;
                        }
                    }

                    mostrarMensaje();

                    setInterval(mostrarMensaje, 5000);
                })
                .catch((error) => {
                    console.error("Error:", error);

                    elDicho.textContent = "Error cargando frases";
                    elDicho.classList.add("mostrar");
                });
        </script>
    </body>
</html>
